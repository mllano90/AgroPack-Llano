# Blueprint Render — AgroPack Llano
# Si el plan "free" falla en Blueprint, crea los servicios a mano (ver DESPLIEGUE_NUBE.md).
#
# Tras el deploy:
# 1. Copia la URL de agropack-api
# 2. En agropack-web pon VITE_API_URL = esa URL (sin / final) y redeploy

services:
  # API FastAPI (runtime Python nativo; mejor compatibilidad free que Docker)
  - type: web
    name: agropack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Omitir "plan" si free falla; en el dashboard elige "Free" al crear a mano.
    # plan: free
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: agropack-db
          property: connectionString

  # Frontend estático (React build)
  - type: web
    name: agropack-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Los static sites no usan el mismo "plan free" que un web service Docker
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: agropack-db
    plan: free
    databaseName: agropack_llano
    user: agro
