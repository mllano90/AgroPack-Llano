# Blueprint para Render.com
# Dashboard: https://dashboard.render.com → New → Blueprint → conectar este repo
#
# Tras el deploy:
# 1. Anota la URL del backend (ej. https://agropack-api.onrender.com)
# 2. En el servicio frontend, define VITE_API_URL = esa URL (sin barra final)
# 3. Redeploy del frontend si hace falta
# 4. Crear admin: POST /api/auth/register (primer usuario sin token)

services:
  - type: web
    name: agropack-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: agropack-db
          property: connectionString

  - type: web
    name: agropack-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # IMPORTANTE: tras crear agropack-api, pon aquí su URL pública
      # Ejemplo: https://agropack-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: agropack-db
    plan: free
    databaseName: agropack_llano
    user: agro
